<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFF テスト</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: #fafafa;
    padding: 24px;
    color: #333;
  }
  h1 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    word-break: break-all;
  }
  .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .value {
    font-size: 15px;
    font-weight: bold;
  }
  .error {
    color: #c00;
    background: #fee;
    padding: 12px;
    border-radius: 8px;
  }
  img.avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<h1>LIFF 動作確認ページ</h1>
<div id="result">読み込み中...</div>

<script>
  const LIFF_ID = "2008373459-EgALV25y";

  async function main() {
    const resultEl = document.getElementById("result");
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      const idToken = liff.getDecodedIDToken();

      resultEl.innerHTML = `
        <img class="avatar" src="${profile.pictureUrl || ''}" alt="">
        <div class="box">
          <div class="label">表示名</div>
          <div class="value">${profile.displayName}</div>
        </div>
        <div class="box">
          <div class="label">ユーザーID（userId）</div>
          <div class="value">${profile.userId}</div>
        </div>
        <div class="box">
          <div class="label">ステータスメッセージ</div>
          <div class="value">${profile.statusMessage || "（なし）"}</div>
        </div>
        <div class="box">
          <div class="label">外部ブラウザかどうか</div>
          <div class="value">${liff.isInClient() ? "LINEアプリ内" : "外部ブラウザ"}</div>
        </div>
      `;
    } catch (err) {
      resultEl.innerHTML = `<div class="error">エラーが発生しました：<br>${err.message || err}</div>`;
    }
  }

  main();
</script>

</body>
</html>
